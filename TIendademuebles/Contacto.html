<!DOCTYPE html>
    <html lang="es">
        <head>
                <meta charset="UTF-8">
                <meta name="viewport" content="width=device-width, initial-scale=1.0">

                <title>Contacto</title>

                <link rel="stylesheet" href="css/styles.css">

        </head>
                <body class="pagina-contacto">

                    <section id ='contacto' class="contact-section">

                            <header class="bg-dark py-5"
                                    style="background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1618220179428-22790b461013?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80'); background-size: cover; background-position: center;">
                                    <div class="container px-4 px-lg-5 my-5">
                                        <div class="text-center text-white">
                                            <h1 class="display-4 fw-bolder">Contacto</h1>
                                            <p class="lead fw-normal text-white">¿Tienes alguna pregunta? Escríbenos y te responderemos lo antes posible.</p>
                                        </div>
                                    </div>
                            </header>

                            <!-- INFORMACIÓN -->
                            <div class="contact-info">

                                <h3>Información de contacto</h3>

                                <div class="contact-item">
                                    <strong>Dirección:</strong><br>
                                    Calle Bravo Murillo, 25 - Madrid<br>
                                
                                </div>

                                <div class="contact-item">
                                <strong>Teléfono:</strong><br>
                                +34 912 345 678
                                </div>

                                <div class="contact-item">
                                <strong>Email:</strong><br>
                                info@mueblesconestilo.com
                                </div>

                            <div class="contact-item">
                            <strong>Horario:</strong><br>
                            Lunes - Viernes<br>
                            09:00 - 20:00
                            </div>

                            </div> 

                                <!-- FORMULARIO -->
                                <div class="contact-form">

                                    <h3>Envíanos un mensaje</h3>

                                    <form action="enviar.php" method="POST">

                                    <input type="text" name="nombre" placeholder="Nombre completo" required>

                                    <input type="email" name="email" placeholder="Correo electrónico" required>

                                    <input type="tel" name="telefono" placeholder="Teléfono">

                                    <select name="asunto">
                                        <option value="">Selecciona un asunto</option>
                                        <option value="consulta">Consulta</option>
                                        <option value="soporte">Soporte</option>
                                        <option value="presupuesto">Solicitar presupuesto</option>
                                        <option value="otro">Otro</option>
                                    </select>

                                    <textarea name="mensaje" placeholder="Escribe tu mensaje..." required></textarea>

                                    <label class="checkbox">
                                        <input type="checkbox" required>
                                            Acepto la política de privacidad
                                    </label>

                                    <button type="submit">Enviar mensaje</button>

                                    </form>

                                </div>
                            <div class="map">
                                <iframe 
                                    src="https://www.google.com/maps?q=Calle+de+Bravo+Murillo+25+Madrid&output=embed"
                                    width="100%" 
                                    height="350" 
                                    style="border:0;" 
                                    allowfullscreen="" 
                                    loading="lazy">
                                </iframe>
                            </div>

                    </section>

                </body>
    </html>
